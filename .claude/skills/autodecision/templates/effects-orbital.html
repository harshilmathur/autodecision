<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Effects Orbital</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #0a0a0f; color: #eee; overflow: hidden; height: 100vh; }

  .header { position: fixed; top: 0; left: 0; right: 0; padding: 20px 32px; z-index: 10; background: linear-gradient(to bottom, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%); pointer-events: none; }
  .header h1 { margin: 0 0 4px 0; font-size: 14px; font-weight: 600; color: #999; letter-spacing: 0.08em; text-transform: uppercase; }
  .header .decision { font-size: 24px; font-weight: 700; color: #fff; letter-spacing: -0.01em; max-width: 720px; line-height: 1.25; }

  .legend { position: fixed; bottom: 20px; left: 32px; z-index: 10; font-size: 11px; color: #888; display: flex; gap: 18px; align-items: center; flex-wrap: wrap; background: rgba(20, 20, 25, 0.8); padding: 10px 14px; border-radius: 8px; backdrop-filter: blur(8px); }
  .legend-row { display: flex; gap: 7px; align-items: center; }
  .legend-row strong { color: #ccc; font-weight: 600; }
  .legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
  .legend-diamond { display: inline-block; transform: rotate(45deg); width: 9px; height: 9px; }

  .tooltip { position: fixed; padding: 10px 12px; background: rgba(15,15,20,0.98); border: 1px solid rgba(255,255,255,0.1); color: #eee; border-radius: 8px; font-size: 12px; pointer-events: none; opacity: 0; max-width: 380px; line-height: 1.5; box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100; transition: opacity 0.15s; }
  .tooltip .t-kicker { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 6px; font-weight: 600; }
  .tooltip .t-kicker.adv { color: #ff6b6b; }
  .tooltip .t-kicker.swan { color: #c8a7e0; }
  .tooltip .t-title { font-weight: 600; margin-bottom: 8px; color: #fff; font-size: 13px; }
  .tooltip .t-meta { color: #999; font-size: 11px; margin-top: 6px; display: flex; gap: 10px; flex-wrap: wrap; }
  .tooltip .t-p { color: #7bd88f; font-weight: 600; }
  .tooltip .t-leth { color: #ff8a95; font-weight: 600; }

  svg { width: 100vw; height: 100vh; cursor: grab; display: block; }
  svg:active { cursor: grabbing; }

  .orbit-ring { fill: none; stroke: rgba(255,255,255,0.04); stroke-dasharray: 2,4; }
  .orbit-ring-threat { fill: none; stroke: rgba(255, 71, 87, 0.07); stroke-dasharray: 2,5; }
  .orbit-ring-swan { fill: none; stroke: rgba(180, 150, 220, 0.08); stroke-dasharray: 1,4; }
  .band-label { fill: #555; font-size: 10px; font-weight: 600; text-anchor: middle; letter-spacing: 0.12em; text-transform: uppercase; pointer-events: none; }
  .band-label.adv { fill: #6a3a42; }
  .band-label.swan { fill: #5a4a7a; }

  .center-node circle { fill: #fff; stroke: #7bd88f; stroke-width: 2; filter: drop-shadow(0 0 20px rgba(123, 216, 143, 0.35)); }
  .center-node text { fill: #0a0a0f; font-weight: 700; font-size: 10px; text-anchor: middle; dominant-baseline: central; letter-spacing: 0.02em; pointer-events: none; }

  .hypothesis-node { cursor: pointer; transition: filter 0.15s; }
  .hypothesis-node circle { stroke: white; stroke-width: 2; filter: drop-shadow(0 0 12px rgba(0,0,0,0.5)); transition: stroke-width 0.2s; }
  .hypothesis-node:hover { filter: brightness(1.2); }
  .hypothesis-node.focused circle { stroke: rgba(255,255,255,0.95); stroke-width: 3.5; }
  .hypothesis-h { fill: #fff; font-size: 11px; font-weight: 700; pointer-events: none; text-anchor: middle; dominant-baseline: central; }
  .hypothesis-name { font-size: 11px; font-weight: 600; cursor: pointer; text-anchor: middle; transition: fill 0.15s; paint-order: stroke; stroke: rgba(10,10,15,0.9); stroke-width: 3; stroke-linejoin: round; }
  .hypothesis-name:hover { fill: #fff !important; }
  .hypothesis-sub { fill: #666; font-size: 9px; cursor: pointer; text-anchor: middle; }

  .link-hyp-fo { fill: none; stroke-opacity: 0.35; pointer-events: none; }
  .link-fo-so { fill: none; stroke-opacity: 0.22; pointer-events: none; }

  .fo-node, .so-node { cursor: pointer; }
  .fo-node circle { transition: stroke-width 0.15s; }
  .so-node circle { transition: stroke-width 0.15s; }
  .fo-node circle:hover, .so-node circle:hover { stroke-width: 2.5; }

  .fo-prob, .so-prob { fill: rgba(0,0,0,0.7); font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; letter-spacing: -0.02em; }

  .correlation { fill: none; stroke: #ffb74d; stroke-dasharray: 2,4; stroke-width: 1; stroke-opacity: 0.4; pointer-events: none; transition: stroke-opacity 0.2s, stroke-width 0.2s; }
  .correlation:hover { stroke-opacity: 0.9; stroke-width: 2; }
  .correlation-pulse { cursor: pointer; pointer-events: stroke; }

  /* Chain highlight: dim everything except the focused chain */
  .chain-fade { opacity: 0.12 !important; transition: opacity 0.2s; }

  .fo-tag { fill: rgba(0,0,0,0.62); font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; letter-spacing: 0.04em; }
  .so-tag { fill: rgba(0,0,0,0.55); font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; }

  .threat { cursor: pointer; transition: filter 0.15s; }
  .threat-diamond { fill: #ff4757; stroke: #ff6b7a; stroke-width: 1.5; filter: drop-shadow(0 0 10px rgba(255, 71, 87, 0.55)); }
  .threat:hover { filter: brightness(1.25); }
  .threat-symbol { fill: #ffd8db; font-size: 12px; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
  .threat-link { stroke: #ff4757; stroke-opacity: 0.55; stroke-dasharray: 3,3; stroke-width: 1.5; fill: none; pointer-events: none; }

  .swan { cursor: pointer; transition: filter 0.15s; }
  .swan-head { fill: rgba(20, 0, 40, 0.9); stroke: #b39ddb; stroke-width: 1.5; filter: drop-shadow(0 0 12px rgba(179, 157, 219, 0.55)); }
  .swan:hover { filter: brightness(1.25); }
  .swan-text { fill: #e1bee7; font-size: 9px; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; letter-spacing: 0.06em; }

  .dim { opacity: 0.18 !important; transition: opacity 0.25s; }

  .reset-btn { position: fixed; top: 20px; right: 32px; z-index: 10; background: rgba(30,30,40,0.8); border: 1px solid rgba(255,255,255,0.14); color: #ccc; padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; backdrop-filter: blur(8px); letter-spacing: 0.04em; transition: background 0.15s; }
  .reset-btn:hover { background: rgba(40,40,55,0.9); color: #fff; }
</style>
</head>
<body>

<div class="header">
  <h1>Auto-Decision Effects Map · Orbital View</h1>
  <div class="decision" id="decision-title"></div>
</div>

<button class="reset-btn" id="reset-btn" style="display:none">Reset focus</button>

<svg id="viz"></svg>

<div class="legend">
  <div class="legend-row"><strong>Center</strong> decision</div>
  <div class="legend-row"><strong>● Ring 1</strong> hypotheses</div>
  <div class="legend-row"><strong>◯ Ring 2</strong> 1st-order effects</div>
  <div class="legend-row"><strong>· Ring 3</strong> 2nd-order effects</div>
  <div class="legend-row"><span class="legend-diamond" style="background:#ff4757"></span>Worst case</div>
  <div class="legend-row"><span class="legend-dot" style="background:#b39ddb"></span><strong>BS</strong> black swan</div>
  <div class="legend-row" style="color:#555">Size ∝ probability · Glow ∝ agreement</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const HYP_COLORS = ['#4fc3f7', '#81c784', '#ba68c8', '#ffb74d', '#4dd0e1'];
const tooltip = d3.select('#tooltip');

// HTML-escape any dynamic field before interpolation. Tooltips are built via
// d3 .html() (we need the structural <div> wrappers), so every value coming
// from the inlined dataset — descriptions, labels, worst_case/black_swan
// text, correlations — must be escaped or it will be parsed as HTML and can
// execute arbitrary script (the data originates from LLM persona output).
const esc = (s) => String(s == null ? '' : s).replace(
  /[&<>"']/g,
  (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
);

function showTip(ev, html, cls = '') {
  tooltip.node().className = 'tooltip' + (cls ? ' ' + cls : '');
  tooltip.html(html)
    .style('left', Math.min(ev.clientX + 16, window.innerWidth - 400) + 'px')
    .style('top', Math.max(ev.clientY - 10, 20) + 'px')
    .style('opacity', 1);
}
function hideTip() { tooltip.style('opacity', 0); }

// Data is inlined by the generator (see scripts/generate-effects-viz.py).
// For the standalone mockup, this still falls back to fetching sample-data-full.json.
const __INLINED_DATA__ = /*__DATA_START__*/ null /*__DATA_END__*/;
const dataPromise = __INLINED_DATA__ ? Promise.resolve(__INLINED_DATA__) : d3.json('sample-data-full.json');
dataPromise.then(data => {
  document.getElementById('decision-title').textContent = data.decision;

  const W = window.innerWidth;
  const H = window.innerHeight;
  const cx = W / 2;
  const cy = H / 2 + 10;

  // Ring radii — proportional cascade, each ring far enough from neighbors to breathe
  const SYSTEM_RADIUS = Math.min(W, H) * 0.47;
  const R_HYP  = SYSTEM_RADIUS * 0.28;  // hypotheses: close to center
  const R_E1   = SYSTEM_RADIUS * 0.52;  // 1st-order: ~150px out from hypotheses
  const R_E2   = SYSTEM_RADIUS * 0.72;  // 2nd-order
  const R_ADV  = SYSTEM_RADIUS * 0.86;  // threat diamonds
  const R_SWAN = SYSTEM_RADIUS * 0.99;  // black swans
  const CENTER_R = 44;

  const svg = d3.select('#viz');
  const root = svg.append('g');
  svg.call(d3.zoom().scaleExtent([0.4, 3]).on('zoom', (ev) => root.attr('transform', ev.transform)));

  // === Rings ===
  root.append('circle').attr('class', 'orbit-ring').attr('cx', cx).attr('cy', cy).attr('r', R_HYP);
  root.append('circle').attr('class', 'orbit-ring').attr('cx', cx).attr('cy', cy).attr('r', R_E1);
  root.append('circle').attr('class', 'orbit-ring').attr('cx', cx).attr('cy', cy).attr('r', R_E2);
  root.append('circle').attr('class', 'orbit-ring-threat').attr('cx', cx).attr('cy', cy).attr('r', R_ADV);
  root.append('circle').attr('class', 'orbit-ring-swan').attr('cx', cx).attr('cy', cy).attr('r', R_SWAN);

  // (Band labels dropped — legend at bottom covers ring meanings, and labels clashed with H1)

  // === Center (the decision) ===
  const center = root.append('g').attr('class', 'center-node').attr('transform', `translate(${cx},${cy})`);
  center.append('circle').attr('r', CENTER_R);
  const words = data.decision.replace(/\?$/, '').split(' ');
  const lines = [];
  let cur = '';
  words.forEach(w => {
    if ((cur + ' ' + w).length > 14) { if (cur) lines.push(cur.trim()); cur = w; }
    else cur = cur ? cur + ' ' + w : w;
  });
  if (cur) lines.push(cur.trim());
  const displayLines = lines.slice(0, 4);
  const fs = displayLines.length > 3 ? 9 : 10;
  displayLines.forEach((line, i) => {
    center.append('text')
      .attr('y', (i - (displayLines.length - 1) / 2) * (fs + 1))
      .style('font-size', fs + 'px')
      .text(line);
  });

  // === Hypothesis layout ===
  const N = data.hypotheses.length;
  const angleStep = (2 * Math.PI) / N;
  const startAngle = -Math.PI / 2;

  // Track FO node positions by effect_id — used for correlation lines and chain highlights
  const foPositions = new Map();  // effect_id → { x, y, hIdx, selection, color }

  data.hypotheses.forEach((h, i) => {
    const ang = startAngle + i * angleStep;
    const hx = cx + R_HYP * Math.cos(ang);
    const hy = cy + R_HYP * Math.sin(ang);
    const color = HYP_COLORS[i % HYP_COLORS.length];

    // Sun → hypothesis line (grows from sun outward during load)
    root.append('line').attr('data-h', i)
      .attr('x1', cx).attr('y1', cy).attr('x2', cx).attr('y2', cy)
      .attr('stroke', color).attr('stroke-opacity', 0.25).attr('stroke-width', 1.5)
      .transition().delay(200 + i * 60).duration(400).ease(d3.easeCubicOut)
      .attr('x2', hx).attr('y2', hy);

    // Hypothesis node — fades and grows in
    const hypG = root.append('g')
      .attr('class', 'hypothesis-node').attr('data-h', i)
      .attr('transform', `translate(${hx},${hy})`)
      .style('opacity', 0);
    hypG.transition().delay(300 + i * 60).duration(400).style('opacity', 1);
    hypG.append('circle').attr('r', 18).attr('fill', color)
      .on('mouseover', (ev) => {
        const statusColor = h.status && h.status.includes('ELIMINATED') ? '#ff6b7a'
          : h.status && h.status.includes('SUPPORTED') ? '#7bd88f'
          : h.status && h.status.includes('WEAKENED') ? '#ffb74d'
          : '#ccc';
        showTip(ev, `
          <div class="t-kicker">Hypothesis ${i + 1}</div>
          <div class="t-title">${esc(h.label)}</div>
          <div class="t-meta">
            ${h.status ? `<span style="color:${statusColor};font-weight:700">${esc(h.status)}</span>` : ''}
            <span>${h.effects.length} 1st-order</span>
            <span>${h.effects.reduce((s, e) => s + (e.children || []).length, 0)} 2nd-order</span>
            ${h.lethality ? `<span class="t-leth">Lethality ${+h.lethality}/10</span>` : ''}
          </div>
          ${h.status_detail ? `<div class="t-meta" style="margin-top:6px;border-top:none;padding-top:0;color:#aaa;font-style:italic">${esc(h.status_detail)}</div>` : ''}`);
      })
      .on('mouseout', hideTip);
    hypG.append('text').attr('class', 'hypothesis-h').text('H' + (i + 1));

    // Hypothesis name label — OUTWARD from the hypothesis (toward 1st-order ring).
    // Outward placement spreads labels apart as angles diverge, avoiding collisions
    // between H3/H4 and H2/H5 that happened with inward placement.
    // +45 gives ~27px clearance from hypothesis top edge (hypothesis R=18, glow ~10px).
    const labelR = R_HYP + 45;
    const lx = cx + labelR * Math.cos(ang);
    const ly = cy + labelR * Math.sin(ang);
    const cleanName = h.label.replace(/^H\d+:\s*/, '');
    root.append('text')
      .attr('class', 'hypothesis-name').attr('data-h', i)
      .attr('x', lx).attr('y', ly).attr('dy', '0.35em')
      .style('fill', color)
      .style('opacity', 0)
      .text(cleanName)
      .on('click', function(ev) { toggleFocus.call(this, ev); })
      .transition().delay(400 + i * 60).duration(400).style('opacity', 1);

    // === 1st-order effects — spread within sector, fuller sizes for cluster feel ===
    const effects1 = h.effects;
    const sectorAngle = angleStep * 0.85;
    const e1StartAng = ang - sectorAngle / 2;

    effects1.forEach((e, j) => {
      const subAng = effects1.length === 1
        ? ang
        : e1StartAng + (sectorAngle / (effects1.length - 1)) * j;
      const ex = cx + R_E1 * Math.cos(subAng);
      const ey = cy + R_E1 * Math.sin(subAng);
      // Full probability-scaled size — no density cap. Overlap is OK, gives cluster feel.
      const rad = 4 + e.p * 16;

      const midR = (R_HYP + R_E1) / 2;
      const mx = cx + midR * Math.cos((ang + subAng) / 2);
      const my = cy + midR * Math.sin((ang + subAng) / 2);
      const linkHypFo = root.append('path')
        .attr('class', 'link-hyp-fo')
        .attr('data-h', i).attr('data-effect-id', e.id)
        .attr('d', `M ${hx} ${hy} Q ${mx} ${my}, ${ex} ${ey}`)
        .attr('stroke', color).attr('stroke-width', 0.6 + e.p * 1.8)
        .style('opacity', 0);
      linkHypFo.transition().delay(600 + j * 40).duration(300).style('opacity', 1);

      const foG = root.append('g').attr('class', 'fo-node')
        .attr('data-h', i).attr('data-effect-id', e.id);

      // Circle grows from hypothesis position outward to final spot — cascade animation
      const foCircle = foG.append('circle')
        .attr('cx', hx).attr('cy', hy).attr('r', 0)
        .attr('fill', color).attr('fill-opacity', 0.42 + e.agreement * 0.1)
        .attr('stroke', color).attr('stroke-width', 1.2)
        .on('mouseover', function(ev) {
          highlightChain(i, e.id);
          showTip(ev, `
            <div class="t-kicker">1st-order · ${esc(h.label)}</div>
            <div class="t-title">${esc(e.desc)}</div>
            <div class="t-meta">
              <span class="t-p">P ${(e.p * 100).toFixed(0)}%</span>
              <span>Range [${(e.p_range[0] * 100).toFixed(0)}–${(e.p_range[1] * 100).toFixed(0)}%]</span>
              <span>Agreement ${e.agreement}/5</span>
              ${e.timeframe ? `<span>${esc(e.timeframe)}</span>` : ''}
              ${e.specialist ? '<span style="color:#64b5f6">specialist</span>' : ''}
            </div>`);
        })
        .on('mouseout', () => { clearChainHighlight(); hideTip(); });

      foCircle.transition()
        .delay(700 + j * 40).duration(450).ease(d3.easeCubicOut)
        .attr('cx', ex).attr('cy', ey).attr('r', rad);

      // Record FO position for correlation lines drawn later
      foPositions.set(e.id, { x: ex, y: ey, hIdx: i, color: color });

      // === 2nd-order effects ===
      (e.children || []).forEach((c, k) => {
        const spread = 0.055;
        const cAng = subAng + (k - ((e.children.length) - 1) / 2) * spread;
        const ccx = cx + R_E2 * Math.cos(cAng);
        const ccy = cy + R_E2 * Math.sin(cAng);
        const cRad = 3 + c.p * 11;

        const linkFoSo = root.append('line').attr('class', 'link-fo-so')
          .attr('data-h', i).attr('data-parent-effect', e.id)
          .attr('x1', ex).attr('y1', ey)
          .attr('x2', ex).attr('y2', ey)  // starts collapsed onto FO
          .attr('stroke', color).attr('stroke-width', 0.5 + c.p * 1.2)
          .style('opacity', 0);
        linkFoSo.transition().delay(1200 + j * 40 + k * 30).duration(300)
          .style('opacity', 1)
          .attr('x2', ccx).attr('y2', ccy);

        const soG = root.append('g').attr('class', 'so-node')
          .attr('data-h', i).attr('data-parent-effect', e.id);

        const soCircle = soG.append('circle')
          .attr('cx', ex).attr('cy', ey).attr('r', 0)
          .attr('fill', color).attr('fill-opacity', 0.38 + 0.1 * c.agreement)
          .attr('stroke', color).attr('stroke-opacity', 0.8).attr('stroke-width', 1)
          .on('mouseover', function(ev) {
            highlightChain(i, e.id);  // keep parent FO's chain lit up
            showTip(ev, `
              <div class="t-kicker">2nd-order · triggered by ${esc(e.desc.slice(0, 60))}…</div>
              <div class="t-title">${esc(c.desc)}</div>
              <div class="t-meta">
                <span class="t-p">P ${(c.p * 100).toFixed(0)}%</span>
                <span>Agreement ${c.agreement}/5</span>
              </div>`);
          })
          .on('mouseout', () => { clearChainHighlight(); hideTip(); });

        soCircle.transition()
          .delay(1300 + j * 40 + k * 30).duration(400).ease(d3.easeCubicOut)
          .attr('cx', ccx).attr('cy', ccy).attr('r', cRad);
      });
    });

    // === Worst case diamond on R_ADV ring ===
    if (h.worst_case) {
      const tx = cx + R_ADV * Math.cos(ang);
      const ty = cy + R_ADV * Math.sin(ang);
      const lethality = h.lethality || 5;
      const tSize = 9 + (lethality / 10) * 10;

      // Dashed line goes from the hypothesis NODE to the worst-case diamond.
      // Signals "this is what happens when this hypothesis fails" — the link is to H, not to an abstract outer point.
      root.append('line').attr('class', 'threat-link').attr('data-h', i)
        .attr('x1', hx + 18 * Math.cos(ang))  // start at outer edge of hypothesis circle
        .attr('y1', hy + 18 * Math.sin(ang))
        .attr('x2', tx - tSize * Math.cos(ang))  // end just before the diamond
        .attr('y2', ty - tSize * Math.sin(ang))
        .style('opacity', 0)
        .transition().delay(1800 + i * 60).duration(400).style('opacity', 1);

      const threat = root.append('g').attr('class', 'threat').attr('data-h', i)
        .attr('transform', `translate(${tx},${ty})`)
        .style('opacity', 0);
      threat.transition().delay(1900 + i * 60).duration(400).style('opacity', 1);
      threat.append('path').attr('class', 'threat-diamond')
        .attr('d', `M 0 ${-tSize} L ${tSize} 0 L 0 ${tSize} L ${-tSize} 0 Z`)
        .on('mouseover', (ev) => showTip(ev, `
          <div class="t-kicker adv">⚠ Worst case · ${esc(h.label)}</div>
          <div class="t-title">${esc(h.worst_case)}</div>
          <div class="t-meta">
            <span class="t-leth">Lethality ${+lethality}/10</span>
            <span>Scored by adversary phase</span>
          </div>`, 'adv'))
        .on('mouseout', hideTip);
      threat.append('text').attr('class', 'threat-symbol').text('⚠');
    }
  });

  // === Black swans — outer ring, angularly offset between hypotheses ===
  const swans = data.hypotheses.filter(h => h.black_swan);
  swans.forEach((h, i) => {
    const swanAng = startAngle + (i + 0.5) * angleStep;
    const sx = cx + R_SWAN * Math.cos(swanAng);
    const sy = cy + R_SWAN * Math.sin(swanAng);

    const swanG = root.append('g').attr('class', 'swan')
      .attr('transform', `translate(${sx},${sy})`)
      .style('opacity', 0);
    swanG.transition().delay(2100 + i * 80).duration(500).style('opacity', 1);
    swanG.append('circle').attr('class', 'swan-head').attr('r', 13)
      .on('mouseover', (ev) => showTip(ev, `
        <div class="t-kicker swan">◯ Black swan · ${esc(h.label)}</div>
        <div class="t-title">${esc(h.black_swan)}</div>
        <div class="t-meta">
          <span class="t-p">P &lt; 5% (unlisted)</span>
          <span>High impact</span>
          <span>Cross-cutting</span>
          <span>Not in effects chain</span>
        </div>`, 'swan'))
      .on('mouseout', hideTip);
    swanG.append('text').attr('class', 'swan-text').text('BS');
  });

  // === Hidden correlations — amber dashed lines between correlated effects ===
  // These are effect pairs the adversary flagged as compound risk (not independent).
  data.hypotheses.forEach((h, hi) => {
    (h.correlations || []).forEach((corr, ci) => {
      const [id1, id2] = corr.effects || [];
      if (!id1 || !id2) return;
      const p1 = foPositions.get(id1);
      const p2 = foPositions.get(id2);
      if (!p1 || !p2) return;  // one of the effects wasn't rendered (rare — ignore)

      // Curve through a midpoint offset perpendicular to the line, for a subtle arc
      const midX = (p1.x + p2.x) / 2;
      const midY = (p1.y + p2.y) / 2;
      const dx = p2.x - p1.x;
      const dy = p2.y - p1.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      // Perpendicular unit vector, rotated so arc bows away from center
      const nx = -dy / len;
      const ny = dx / len;
      // Push arc away from the decision center
      const toCenterX = midX - cx;
      const toCenterY = midY - cy;
      const sign = (nx * toCenterX + ny * toCenterY) < 0 ? -1 : 1;
      const arcOffset = Math.min(40, len * 0.2);
      const ctrlX = midX + nx * arcOffset * sign;
      const ctrlY = midY + ny * arcOffset * sign;

      // Look up the two effects' probabilities from the source hypothesis data
      const findP = (eid) => {
        for (const hh of data.hypotheses) {
          for (const ee of (hh.effects || [])) if (ee.id === eid) return ee.p;
        }
        return null;
      };
      const p1Val = findP(id1);
      const p2Val = findP(id2);
      const jointNaive = (p1Val != null && p2Val != null) ? p1Val * p2Val : null;

      const corrEl = root.append('path')
        .attr('class', 'correlation correlation-pulse')
        .attr('data-effect-1', id1).attr('data-effect-2', id2)
        .attr('d', `M ${p1.x} ${p1.y} Q ${ctrlX} ${ctrlY}, ${p2.x} ${p2.y}`)
        .style('opacity', 0);
      corrEl
        .on('mouseover', (ev) => showTip(ev, `
          <div class="t-kicker" style="color:#ffb74d">⚡ Hidden correlation</div>
          <div class="t-title">Compound risk: not independent</div>
          <div class="t-meta" style="margin-bottom:8px">${esc(corr.compound || 'Effects interact — joint probability higher than product')}</div>
          <div class="t-meta">
            ${p1Val != null ? `<span class="t-p">P₁ ${(p1Val * 100).toFixed(0)}%</span>` : ''}
            ${p2Val != null ? `<span class="t-p">P₂ ${(p2Val * 100).toFixed(0)}%</span>` : ''}
            ${jointNaive != null ? `<span style="color:#ffb74d">Naive joint ${(jointNaive * 100).toFixed(0)}% · actual higher</span>` : ''}
          </div>`))
        .on('mouseout', hideTip);
      corrEl.transition()
        .delay(2400 + hi * 80 + ci * 40).duration(500)
        .style('opacity', 0.4);
    });
  });

  // === Chain highlight: hover FO/SO to light up its ancestry, dim the rest ===
  function highlightChain(hIdx, effectId) {
    // Dim EVERYTHING that has a data-h or is FO/SO link
    root.selectAll('.fo-node, .so-node, .link-hyp-fo, .link-fo-so, .correlation')
      .classed('chain-fade', true);
    // Un-dim: the FO itself, its SO children, the hypothesis→FO link, FO→SO links
    root.selectAll(`.fo-node[data-effect-id="${effectId}"]`).classed('chain-fade', false);
    root.selectAll(`.so-node[data-parent-effect="${effectId}"]`).classed('chain-fade', false);
    root.selectAll(`.link-hyp-fo[data-effect-id="${effectId}"]`).classed('chain-fade', false);
    root.selectAll(`.link-fo-so[data-parent-effect="${effectId}"]`).classed('chain-fade', false);
    // If correlations involve this effect, light them up too
    root.selectAll(`.correlation[data-effect-1="${effectId}"], .correlation[data-effect-2="${effectId}"]`)
      .classed('chain-fade', false);
  }
  function clearChainHighlight() {
    root.selectAll('.chain-fade').classed('chain-fade', false);
  }

  // === Click focus ===
  let focused = null;

  function focusHypothesis(idx) {
    hideTip();
    root.selectAll('[data-h]').classed('dim', function() {
      return d3.select(this).attr('data-h') !== String(idx);
    });
    root.selectAll('.hypothesis-node').classed('focused', function() {
      return +d3.select(this).attr('data-h') === idx;
    });
    d3.select('#reset-btn').style('display', 'block');
    focused = idx;
  }
  function resetFocus() {
    root.selectAll('.dim').classed('dim', false);
    root.selectAll('.focused').classed('focused', false);
    d3.select('#reset-btn').style('display', 'none');
    focused = null;
  }
  function toggleFocus(ev) {
    ev.stopPropagation();
    const idx = +d3.select(this).attr('data-h');
    if (focused === idx) resetFocus(); else focusHypothesis(idx);
  }

  root.selectAll('.hypothesis-node, .hypothesis-name, .hypothesis-sub').on('click', toggleFocus);

  // Only reset when clicking the SVG background itself, not any child
  svg.on('click', (ev) => {
    if (ev.target === svg.node()) resetFocus();
  });
  d3.select('#reset-btn').on('click', resetFocus);
});
</script>
</body>
</html>
